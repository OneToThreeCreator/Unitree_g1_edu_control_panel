; ═══════════════════════════════════════════════════════════════════════
;  Управление умной головой Кузьмича — Light (LED + Servo)
;  Платформа: ESP32-C3 (RISC-V, single-core). Аудио в проекте отсутствует.
;
;  Железо (разводка пользователя):
;    GPIO10 ─ WS2812B DIN            · 2 панели × 7 = 14 адресных диодов
;    GPIO4  ─ Servo 1 PWM  (левый глаз)
;    GPIO2  ─ Servo 2 PWM  (правый глаз)
;
;  Примечание по C3: GPIO2/GPIO8/GPIO9 — strapping-пины. GPIO2 используется
;  под Servo 2: линия PWM в покое низкая, но во время загрузки не должна
;  удерживаться иначе, чем задумано загрузчиком. Обычный серво подключением
;  сигнала загрузке не мешает; при проблемах со стартом временно отключите
;  серво или перенесите его на другой свободный GPIO.
; ═══════════════════════════════════════════════════════════════════════

[platformio]
default_envs = esp32-c3

[env:esp32-c3]
platform          = espressif32@^6.7.0
board             = esp32-c3-devkitm-1    ; ESP32-C3 DevKitM-1
framework         = arduino
monitor_speed     = 115200
upload_speed      = 921600
board_build.filesystem = littlefs         ; для отдачи фото команды (data/team.jpg)

lib_deps =
    adafruit/Adafruit NeoPixel @ ^1.12.0
    ESP32Async/ESPAsyncWebServer @ ^3.0.0
    ESP32Async/AsyncTCP @ ^3.0.0
    bblanchon/ArduinoJson @ ^6.21.0
    links2004/WebSockets @ ^2.7.0
    madhephaestus/ESP32Servo @ ^3.0.0

build_flags =
    -std=gnu++17
    -DCORE_DEBUG_LEVEL=1
    -Wall
    -DENABLE_SERVOS=true
    ; ESP32-C3: Serial-монитор идёт через встроенный USB-CDC
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1

; ═══════════════════════════════════════════════════════════════════════
;  OTA-прошивка (после первой заливки по USB):
;    pio run -t upload --upload-port esp32-control.local
; ═══════════════════════════════════════════════════════════════════════
