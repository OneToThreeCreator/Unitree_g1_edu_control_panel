; =============================================================================
; Kuzmich companion config — Внешняя ИИ (облачная модель)
; Reload at runtime: kill -USR1 <pid>
; =============================================================================

[ai]
; Backend: "llama" (local llama-server), "openai" (OpenAI-compatible HTTP),
;          or "vllm" (VLLM Realtime API via WebSocket)
; When realtime_url is set in [realtime], WebSocket Realtime API is used
; instead of HTTP chat/completions regardless of the backend value.
backend =
base_url = https://api.openai.com/v1
api_key =
; Model name — global default for all backends.
; [realtime] model overrides this if set.
model =
temperature = 0.7
max_tokens = 45

[realtime]
; Realtime API WebSocket URL — shared by all backends.
; If set, enables WebSocket-based Realtime API instead of HTTP chat/completions.
; For VLLM:  wss://your-vllm-server:8000/v1/realtime
; For OpenAI: wss://api.openai.com/v1/realtime
; Leave empty to disable Realtime API (use HTTP fallback).
realtime_url =
; Voice for model-generated audio output (alloy, echo, fable, onyx, nova, shimmer).
; Set to "none" to disable model audio — text only, external TTS is used.
voice = alloy
; API key for Realtime API (falls back to [ai] api_key if empty)
api_key =
; Model name for Realtime session (falls back to [ai] model if empty).
model =
; Temperature for Realtime session (falls back to [ai] temperature if empty)
temperature =
; Maximum conversation turns before server-side session reset (0 = unlimited)
max_session_turns = 50

[vllm]
; Auto-start vllm server on launch (when backend = vllm)
start_server = false
; vllm server listen port (host is always 0.0.0.0 inside Docker, uses --network=host)
port = 8000
; Docker image for vllm (must be pre-pulled: docker pull <image>)
docker_image = dustynv/vllm:r36.4-cu129-24.04
; Host directory with model files (mounted into container as /workspace/models)
models_dir = vllm_models
; Served model name (the name clients use to reference the model)
served_model_name =
; Tensor parallel size (number of GPUs)
tensor_parallel_size = 1
; GPU memory utilization fraction
gpu_memory_utilization = 0.80
; Maximum model context length
max_model_len = 4096
; Maximum concurrent sequences
max_num_seqs = 1
; Force CUDA graph capture off (required on some GPU architectures)
enforce_eager = true
; Data type: auto, float16, bfloat16
dtype = auto
; Trust remote code for custom models
trust_remote_code = false
; Seconds to wait after starting server before first request
server_wait = 15.0
; Server stdout/stderr log file
server_log = /tmp/vllm_server.log
; Extra flags passed to vllm api_server (space-separated)
extra_args =

[llama]
start_server = false
; Directory containing GGUF model files (model name from [ai] model is used as filename)
models_dir = llama_models
ctx_size = 4096
gpu_layers = -1
n_threads = 4
server_wait = 5.0
server_log = /tmp/llama_server.log
extra_args =

[voice]
stt_language = ru-RU
sample_rate = 48000
sound_threshold = 0.015
silence_after_speech = 0.7
wake_window = 2.0
no_speech_timeout = 20.0
input_device = 0
system_prompt = kuzmich_system_prompt.txt
system_prompt_max_chars = 3000

[tts]
url = http://127.0.0.1/api/audio/tts
voice =
volume = 100
amplification_db = 15
timeout = 15.0
playback_command = aplay -q
robot_audio_base_url = http://127.0.0.1

[head]
; WebSocket URL для ESP32-C3 (STA-режим, SMITeleop)
ws_url = ws://esp32-control.local:81/
brightness = 120
loading_speed = 120
no_head = false
